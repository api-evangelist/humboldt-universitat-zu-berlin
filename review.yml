  - date: '2026-06-03'
    rating: 2
    summary: >-
      HU Berlin has no consolidated public API developer portal. The verified
      footprint is scholarly/library infrastructure: the edoc institutional
      repository runs DSpace 7, exposing a live public REST API
      (edoc.hu-berlin.de/server/api, HTTP 200) and an OAI-PMH 2.0 endpoint
      (edoc.hu-berlin.de/server/oai/request, Identify returned valid XML
      naming "edoc-Server"). The library's Primus discovery is Ex Libris
      Primo/Alma, which offer open APIs but are not self-service at HU. Identity
      uses Shibboleth/SAML via CMS (operator docs, not a public API). The
      library IT GitHub org UB-HU-Berlin exists (HTTP 200) with ~9 public repos.
      AGNES is the campus/course-catalog system but no documented public API was
      confirmed. All endpoints below were probed live; no endpoints were
      fabricated.
    endpoints:
      - url: https://edoc.hu-berlin.de/server/api
        status: 200
        note: DSpace 7 Server REST API root, live.
      - url: https://edoc.hu-berlin.de/server/oai/request?verb=Identify
        status: 200
        note: OAI-PMH 2.0 Identify returns valid XML, repository "edoc-Server".
      - url: https://www.ub.hu-berlin.de/en/literature-search/catalogues/catalogues
        status: 200
        note: Primus discovery (Primo/Alma) catalog landing; open APIs not self-service.
      - url: https://www.cms.hu-berlin.de/de/dl/hu-iam/shibboleth
