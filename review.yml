      - url: https://github.com/UB-HU-Berlin
        status: 200
        note: University Library IT public GitHub org, ~9 repos.
      - url: https://agnes.hu-berlin.de/
        status: 200
        note: AGNES campus management / course catalog; no documented public API.
      - url: https://www.hu-berlin.de/en
